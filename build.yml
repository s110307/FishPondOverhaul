name: Build FINAL STABLE Mod

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 6.0.x

    - name: Restore
      run: dotnet restore FishPondOverhaul.csproj

    - name: Build
      run: dotnet build FishPondOverhaul.csproj -c Release --no-restore

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: FishPondOverhaul_FINAL
        path: bin/Release/
